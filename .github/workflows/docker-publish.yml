name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🛠️ 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 登录 Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            tslcat/subscription-manager-bot:latest
            tslcat/subscription-manager-bot:${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🎉 构建完成提示
        if: success() && github.event_name != 'pull_request'
        run: |
          echo "✅ Docker 镜像构建并推送成功！"
          echo "📦 镜像地址："
          echo "   docker pull tslcat/subscription-manager-bot:latest"
          echo "   docker pull tslcat/subscription-manager-bot:${{ github.ref_name }}"
